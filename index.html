<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Max — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0e0c0b; font-family: 'JetBrains Mono', monospace; }
    .browser-chrome { display: flex; flex-direction: column; height: 100vh; width: 100%; }
    .titlebar { flex-shrink: 0; background: #1a1714; padding: 11px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2a2520; }
    .url-bar { flex: 1; text-align: center; font-size: 11px; color: #4a4540; letter-spacing: 0.04em; }
    .replay-btn { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #3d3830; background: transparent; border: 1px solid #2a2520; padding: 3px 10px; border-radius: 3px; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; flex-shrink: 0; }
    .replay-btn:hover { color: #f5c4a0; border-color: #3d3028; }
    .term { flex: 1; overflow-y: auto; padding: 44px 48px 52px; background: #0e0c0b; }
    .footer-bar { flex-shrink: 0; background: #0a0908; border-top: 1px solid #1a1714; padding: 10px 48px; display: flex; gap: 20px; align-items: center; }
    .hero-name { font-size: 13px; color: #4a4540; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
    .hero-title { font-size: 32px; font-weight: 700; color: #f5c4a0; line-height: 1.15; margin-bottom: 4px; }
    .hero-sub { font-size: 14px; color: #3d3830; margin-bottom: 36px; }
    .divider { border: none; border-top: 1px solid #1e1a17; margin-bottom: 36px; }
    .block { margin-bottom: 28px; opacity: 0; transition: opacity 0.2s; }
    .block.visible { opacity: 1; }
    .prompt-line { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
    .ps { color: #f5c4a0; font-weight: 700; font-size: 13px; user-select: none; }
    .cmd-text { color: #e8a882; font-size: 13px; }
    .output { padding-left: 26px; font-size: 13px; line-height: 1.85; color: #7a6e65; min-height: 1.85em; }
    .hl { color: #f5c4a0; } .hl2 { color: #c49a7a; } .dim { color: #3d3830; }
    .tag-row { padding-left: 26px; display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px; }
    .tag { background: #1a1714; border: 1px solid #2d2520; color: #a07860; font-size: 11px; padding: 3px 10px; border-radius: 3px; letter-spacing: 0.04em; opacity: 0; transform: translateY(4px); transition: opacity 0.15s, transform 0.15s; }
    .tag.in { opacity: 1; transform: translateY(0); }
    .status-row { padding-left: 26px; display: flex; align-items: center; gap: 10px; }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: #f5c4a0; flex-shrink: 0; animation: glow 2s ease-in-out infinite; }
    @keyframes glow { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .status-txt { font-size: 12px; color: #5a5048; }
    .status-txt span { color: #c49a7a; }
    .cta-section { padding-left: 26px; display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
    .btn { font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 9px 20px; border-radius: 4px; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; border: 1px solid #3d3028; background: transparent; color: #f5c4a0; }
    .btn:hover { background: rgba(245,196,160,0.07); border-color: #f5c4a0; }
    .btn.ghost { border-color: #2a2520; color: #4a4540; }
    .btn.ghost:hover { background: #1a1714; color: #7a6e65; border-color: #3d3830; }
    .cursor { display: inline-block; width: 8px; height: 14px; background: #f5c4a0; vertical-align: middle; margin-left: 1px; animation: blink 1.1s step-end infinite; }
    @keyframes blink { 50%{opacity:0} }
    .nav-item { font-size: 11px; color: #3d3830; letter-spacing: 0.06em; cursor: pointer; transition: color 0.15s; font-family: 'JetBrains Mono', monospace; text-decoration: none; }
    .nav-item:hover { color: #f5c4a0; }
    .nav-item.active { color: #c49a7a; }
    .nav-sep { color: #2a2520; font-size: 11px; }
  </style>
</head>
<body>
  <div class="browser-chrome">
    <div class="titlebar">
      <span class="url-bar">max.dev — portfolio</span>
      <button class="replay-btn" id="replayBtn">↺ replay</button>
    </div>
    <div class="term">
      <div class="hero-name">portfolio / home</div>
      <div class="hero-title">Max</div>
      <div class="hero-sub">embedded systems · robotics · controls</div>
      <hr class="divider">
      <div class="block" id="b0">
        <div class="prompt-line"><span class="ps">~$</span><span class="cmd-text" id="cmd0"></span><span class="cursor" id="cur0"></span></div>
        <div class="output" id="out0"></div>
      </div>
      <div class="block" id="b1">
        <div class="prompt-line"><span class="ps">~$</span><span class="cmd-text" id="cmd1"></span><span class="cursor" id="cur1"></span></div>
        <div class="tag-row" id="out1"></div>
      </div>
      <div class="block" id="b2">
        <div class="prompt-line"><span class="ps">~$</span><span class="cmd-text" id="cmd2"></span><span class="cursor" id="cur2"></span></div>
        <div class="output" id="out2"></div>
      </div>
      <div class="block" id="b3">
        <div class="prompt-line"><span class="ps">~$</span><span class="cmd-text" id="cmd3"></span><span class="cursor" id="cur3"></span></div>
        <div class="cta-section" id="out3"></div>
      </div>
    </div>
    <div class="footer-bar">
      <span class="nav-item active">~/home</span>
      <span class="nav-sep">/</span><a href="/projects" class="nav-item">~/projects</a>
      <span class="nav-sep">/</span><a href="/about" class="nav-item">~/about</a>
      <span class="nav-sep">/</span><a href="/resume" class="nav-item">~/resume</a>
      <span class="nav-sep">/</span><a href="/contact" class="nav-item">~/contact</a>
    </div>
  </div>
  <script>
    const CHAR_DELAY = 38, LINE_DELAY = 320, BLOCK_GAP = 520;
    function typeText(el, text, speed) {
      return new Promise(resolve => {
        let i = 0; el.textContent = '';
        const t = setInterval(() => { el.textContent += text[i++]; if (i >= text.length) { clearInterval(t); resolve(); } }, speed);
      });
    }
    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
    function showBlock(id) { const el = document.getElementById(id); if (el) el.classList.add('visible'); }
    function hideCursor(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
    async function runSequence() {
      ['b0','b1','b2','b3'].forEach(id => { const el = document.getElementById(id); if (el) el.classList.remove('visible'); });
      ['cmd0','cmd1','cmd2','cmd3'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = ''; });
      ['out0','out1','out2','out3'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = ''; });
      ['cur0','cur1','cur2','cur3'].forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'inline-block'; });
      await wait(400);
      showBlock('b0');
      await typeText(document.getElementById('cmd0'), 'whoami', CHAR_DELAY);
      await wait(LINE_DELAY); hideCursor('cur0');
      const out0 = document.getElementById('out0');
      for (const html of [
        'Engineer with <span class="hl">5+ years</span> in automotive systems, pivoting into <span class="hl">robotics</span> and <span class="hl">embedded controls</span>.',
        'Currently in grad school — building with <span class="hl2">STM32</span>, <span class="hl2">KiCad</span>, and <span class="hl2">ROS2</span>.',
        '<span class="dim">Hardware nerd. PCB designer. Firmware tinkerer.</span>'
      ]) {
        const p = document.createElement('div'); p.innerHTML = html; p.style.opacity = '0'; p.style.transition = 'opacity 0.3s';
        out0.appendChild(p); await wait(30); p.style.opacity = '1'; await wait(260);
      }
      await wait(BLOCK_GAP);
      showBlock('b1');
      await typeText(document.getElementById('cmd1'), 'ls ./skills', CHAR_DELAY);
      await wait(LINE_DELAY); hideCursor('cur1');
      const tagRow = document.getElementById('out1');
      for (const tag of ['STM32','KiCad 9','ROS2','Python','PCB design','firmware','I2C / SPI','USB CDC','power systems','boost converter','JLCPCB']) {
        const t = document.createElement('span'); t.className = 'tag'; t.textContent = tag;
        tagRow.appendChild(t); await wait(10); t.classList.add('in'); await wait(55);
      }
      await wait(BLOCK_GAP);
      showBlock('b2');
      await typeText(document.getElementById('cmd2'), 'cat status.log', CHAR_DELAY);
      await wait(LINE_DELAY); hideCursor('cur2');
      document.getElementById('out2').innerHTML = '<div class="status-row"><div class="pulse"></div><span class="status-txt"><span>actively looking</span> · open to embedded · robotics · controls roles</span></div>';
      await wait(BLOCK_GAP);
      showBlock('b3');
      await typeText(document.getElementById('cmd3'), './start', CHAR_DELAY);
      await wait(LINE_DELAY);
      document.getElementById('out3').innerHTML = `<a href="/projects"><button class="btn">→ view_projects</button></a><a href="/about"><button class="btn ghost">→ about_me</button></a><a href="/resume"><button class="btn ghost">→ resume.pdf</button></a>`;
    }
    document.getElementById('replayBtn').addEventListener('click', runSequence);
    runSequence();
  </script>
</body>
</html>
